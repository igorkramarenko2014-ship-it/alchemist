[package]
name = "fxp-encoder"
version = "0.0.1"
edition = "2021"
description = "Serum FXP encode/decode — offsets from serum_offset_map_sourced.json, validated by tools/validate-offsets.py"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.getrandom]
version = "0.2"
features = ["js"]
