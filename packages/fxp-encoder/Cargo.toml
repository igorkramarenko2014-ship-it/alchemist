[package]
name = "fxp-encoder"
version = "0.0.1"
edition = "2021"
description = "Serum FXP encode/decode — offsets from serum_offset_map_sourced.json, validated by tools/validate-offsets.py"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.getrandom]
version = "0.2"
features = ["js"]

[[bin]]
name = "watcher-daemon"
path = "src/watcher-daemon.rs"

# Native-only: do not pull into wasm32 lib build (wasm-pack).
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
notify = "8.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
