# Baseline CI: types + Vitest + Igor/brain sync checks + HARD GATE when sample present.
# Browser .fxp export: run `pnpm build:wasm` then `REQUIRE_WASM=1 pnpm assert:wasm` in release workflows.

name: Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # Optional: set repo secret SERUM_SAMPLE_FXP_B64 (base64 of real Serum init .fxp) so strict HARD GATE + warfare A1 can run locally in CI when you also provision WASM (see docs/FIRE.md §M).
      - name: Provision tools/sample_init.fxp from secret (optional)
        env:
          SERUM_SAMPLE_FXP_B64: ${{ secrets.SERUM_SAMPLE_FXP_B64 }}
        run: |
          if [ -n "${SERUM_SAMPLE_FXP_B64:-}" ]; then
            echo "$SERUM_SAMPLE_FXP_B64" | base64 -d > tools/sample_init.fxp
            echo "Provisioned tools/sample_init.fxp from SERUM_SAMPLE_FXP_B64"
          else
            echo "No SERUM_SAMPLE_FXP_B64 — skipping sample provision"
          fi

      - name: verify:ci (verify:harsh + strict release gates when export paths touched)
        run: pnpm verify:ci
        env:
          # main / release/* (push or PR target): strict HARD GATE — sample .fxp required + Python validate.
          ALCHEMIST_STRICT_OFFSETS: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release/') || github.base_ref == 'main' || startsWith(github.base_ref, 'release/')) && '1' || '' }}
        # Includes assert-encoder-diff-prerequisites.mjs, verify:harsh, enforce-release-strict-gates.mjs.
        # When export/encoder-sensitive paths change, strict mode is enforced:
        # ALCHEMIST_STRICT_OFFSETS=1 pnpm assert:hard-gate and REQUIRE_WASM=1 pnpm assert:wasm.
        # PNH: stderr verify_post_summary includes securityVerdict (pass | degraded | fail | null).
        # On GitHub Actions, pnh:simulate runs with --ci (fail on breach; fail on warning tier unless
        # ALCHEMIST_PNH_ALLOW_WARNING=1). Other CI: set ALCHEMIST_PNH_CI=1 for the same behavior.

      - name: IOM power-cell coverage (ghost .ts must be registered)
        run: IOM_ENFORCE_COVERAGE=1 pnpm igor:ci
        env:
          IOM_ENFORCE_COVERAGE: "1"

      - name: WASM artifacts (informational — CI image has no Rust by default)
        run: pnpm assert:wasm
        continue-on-error: true
