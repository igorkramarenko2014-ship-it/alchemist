# Baseline CI: types + Vitest + Igor/brain sync checks + HARD GATE when sample present.
# Browser .fxp export: run `pnpm build:wasm` then `REQUIRE_WASM=1 pnpm assert:wasm` in release workflows.

name: Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: verify:ci (verify:harsh + strict release gates when export paths touched)
        run: pnpm verify:ci
        # Includes verify:harsh and scripts/enforce-release-strict-gates.mjs.
        # When export/encoder-sensitive paths change, strict mode is enforced:
        # ALCHEMIST_STRICT_OFFSETS=1 pnpm assert:hard-gate and REQUIRE_WASM=1 pnpm assert:wasm.
        # PNH: stderr verify_post_summary includes securityVerdict (pass | degraded | fail | null).
        # On GitHub Actions, pnh:simulate runs with --ci (fail on breach; fail on warning tier unless
        # ALCHEMIST_PNH_ALLOW_WARNING=1). Other CI: set ALCHEMIST_PNH_CI=1 for the same behavior.

      - name: IOM power-cell coverage (ghost .ts must be registered)
        run: IOM_ENFORCE_COVERAGE=1 pnpm igor:ci
        env:
          IOM_ENFORCE_COVERAGE: "1"

      - name: WASM artifacts (informational — CI image has no Rust by default)
        run: pnpm assert:wasm
        continue-on-error: true
