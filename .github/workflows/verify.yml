# Baseline CI: types + Vitest + Igor/brain sync checks + HARD GATE when sample present.
# Browser .fxp export: run `pnpm build:wasm` then `REQUIRE_WASM=1 pnpm assert:wasm` in release workflows.

name: Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: verify:ci (HARD GATE + verify:harsh)
        run: pnpm verify:ci
        # Same as: assert:hard-gate (warn if no tools/sample_init.fxp) + verify:harsh.
        # Stricter release job: ALCHEMIST_STRICT_OFFSETS=1 + provision tools/sample_init.fxp before assert:hard-gate.

      - name: WASM artifacts (informational — CI image has no Rust by default)
        run: pnpm assert:wasm
        continue-on-error: true
